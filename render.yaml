services:
  - type: web
    name: destroyer-v5
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn ultimate_destroyer_v5:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: TG_TOKEN
        sync: false   # ← ضع Token تيليغرام هنا في Render dashboard
      - key: TG_CHAT
        sync: false   # ← ضع Chat ID هنا
